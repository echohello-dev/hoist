name: Release Build

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      component: ${{ steps.detect.outputs.component }}
      version: ${{ steps.detect.outputs.version }}
    steps:
      - id: detect
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if [[ "$TAG" == cli-* ]]; then
            echo "component=cli" >> "$GITHUB_OUTPUT"
            echo "version=${TAG#cli-v}" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == v* ]]; then
            echo "component=app" >> "$GITHUB_OUTPUT"
            echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          else
            echo "Unknown tag shape: $TAG" >&2
            exit 1
          fi

  build-cli:
    needs: detect
    if: needs.detect.outputs.component == 'cli'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3
      - name: Install CLI deps
        working-directory: cli
        run: bun install --frozen-lockfile
      - name: Typecheck
        working-directory: cli
        run: bun run node_modules/typescript/bin/tsc --noEmit
      - name: Build per-target binaries
        working-directory: cli
        run: bun run scripts/build-all.ts
      - name: Upload binaries to release
        uses: softprops/action-gh-release@v2
        with:
          files: cli/dist/hoist-*
          tag_name: ${{ github.ref_name }}

  build-app:
    needs: detect
    if: needs.detect.outputs.component == 'app'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: mac-arm64
            args: --mac dmg:arm64
          - os: macos-13
            target: mac-x64
            args: --mac dmg:x64
          - os: windows-latest
            target: win-x64
            args: --win nsis:x64
          - os: ubuntu-latest
            target: linux-x64
            args: --linux AppImage:x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Write version into package.json
        run: |
          node -e "const fs=require('fs');const p=require('./package.json');p.version=process.env.VERSION;fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n');"
        env:
          VERSION: ${{ needs.detect.outputs.version }}
      - name: Build & package
        run: npm run package -- ${{ matrix.args }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing/notarization: opt-in via repo secrets.
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*.exe
            release/*.AppImage
            release/*.yml
            release/*.blockmap
          tag_name: ${{ github.ref_name }}
