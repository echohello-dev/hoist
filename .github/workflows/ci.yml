name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build

  cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3
      - working-directory: cli
        run: bun install --frozen-lockfile
      - working-directory: cli
        run: bun run node_modules/typescript/bin/tsc --noEmit
      - working-directory: cli
        run: bun build src/index.ts --compile --outfile=/tmp/hoist-test --target=bun-linux-x64
